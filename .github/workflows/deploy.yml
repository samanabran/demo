name: Deploy to VPS

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy.yml'
      - 'sgc_scroll_hero_homepage/**'
      - 'sgc_scroll_hero_v2/**'
      - 'sgc_tech_ai_theme/**'
      - 'sgc_offplan_rental_property_management/**'
      - 'sgc_realestate_website/**'
      - 'sgc_appraisal/**'
      - 'sgc_recruitment/**'
      - 'sgc_commission/**'
      - 'sgc_invoicing_dashboard/**'
      - 'sgc_llm_router/**'
      - 'sgc_brochure_leadcapture/**'
      - 'sgc_construction_management/**'
      - 'sgc_deals_management/**'
      - 'sgc_elearning/**'
      - 'sgc_employment_certificate/**'
      - 'sgc_fix_context_eval/**'
      - 'sgc_hr_memos/**'
      - 'sgc_lead_scoring/**'
      - 'sgc_video_conferencing/**'
      - 'sgc_assessment/**'
      - 'kyc_management/**'
      - 'sgc_ui_brand_palette/**'
      - 'sgc_ai_powerbox/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Pull and upgrade modules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (needed to verify commit)
        uses: actions/checkout@v4

      - name: SSH to VPS and pull latest
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 80.241.218.108
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@$SERVER_HOST << 'SSH_EOF'
            set -e
            cd /opt/odoo/demo_presentation/addons
            echo "--- git status before ---"
            git status --short | head -5
            echo "--- pulling main from origin ---"
            git fetch origin main
            git reset --hard origin/main
            echo "--- git log after ---"
            git log --oneline -3
            echo "--- running module upgrade ---"
          SSH_EOF

      - name: Copy upgrade script to VPS
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 80.241.218.108
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Sourced from the checked-out repo (not VPS-side /tmp state, which
          # is not persistent and has been wiped by cleanup passes before).
          scp -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            .github/scripts/upgrade_all.py root@$SERVER_HOST:/tmp/upgrade_all.py

      - name: Restart Odoo and run module upgrade via XML-RPC
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SERVER_HOST: 80.241.218.108
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@$SERVER_HOST << 'SSH_EOF'
            set -e

            # Odoo's long-running server process caches each module's manifest
            # in memory, so ir.module.module.update_list() can miss an on-disk
            # version bump even right after the git reset above — it silently
            # reports "nothing to upgrade" and the old code/views stay live
            # while this job reports success. Restarting first guarantees the
            # upgrade always sees fresh manifests; it's also required anyway
            # for JS/asset changes, which are cached per-process the same way.
            echo "--- restarting demo_presentation to refresh manifest cache ---"
            docker restart demo_presentation

            echo "--- waiting for Odoo to come back up ---"
            for i in $(seq 1 30); do
              code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18030/web/login || true)
              if [ "$code" = "200" ]; then
                echo "Odoo is up (attempt $i)"
                break
              fi
              if [ "$i" = "30" ]; then
                echo "Odoo did not come back up after restart"
                exit 1
              fi
              sleep 2
            done

            # Copy the freshly-scp'd script into the container (fails loudly
            # if missing, instead of silently no-op-ing on a stale/absent file).
            docker cp /tmp/upgrade_all.py demo_presentation:/tmp/upgrade_all.py

            # Run the upgrade via docker exec + XML-RPC
            docker exec demo_presentation python3 /tmp/upgrade_all.py

            echo "--- upgrade complete ---"
          SSH_EOF

      - name: Cleanup
        run: rm -f /tmp/deploy_key
