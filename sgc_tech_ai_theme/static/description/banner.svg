<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F213D"/>
      <stop offset="60%" style="stop-color:#091528"/>
      <stop offset="100%" style="stop-color:#1C2430"/>
    </linearGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#B79554; stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#B79554; stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#B79554; stop-opacity:0"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <!-- Micro-grid pattern -->
  <g opacity="0.04" stroke="#B79554" stroke-width="0.3">
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="20" x2="1200" y2="20"/>
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="140" x2="1200" y2="140"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="220" x2="1200" y2="220"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="0" x2="0" y2="300"/>
    <line x1="20" y1="0" x2="20" y2="300"/>
    <line x1="40" y1="0" x2="40" y2="300"/>
    <line x1="60" y1="0" x2="60" y2="300"/>
    <line x1="80" y1="0" x2="80" y2="300"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="120" y1="0" x2="120" y2="300"/>
    <line x1="140" y1="0" x2="140" y2="300"/>
    <line x1="160" y1="0" x2="160" y2="300"/>
    <line x1="180" y1="0" x2="180" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="220" y1="0" x2="220" y2="300"/>
    <line x1="240" y1="0" x2="240" y2="300"/>
  </g>
  <!-- Gold corner geometry — top left -->
  <line x1="30" y1="30" x2="30" y2="100" stroke="#B79554" stroke-width="0.5" opacity="0.6"/>
  <line x1="30" y1="30" x2="100" y2="30" stroke="#B79554" stroke-width="0.5" opacity="0.6"/>
  <line x1="30" y1="30" x2="65" y2="65" stroke="#B79554" stroke-width="0.3" opacity="0.3"/>
  <!-- Gold corner geometry — bottom right -->
  <line x1="1170" y1="270" x2="1170" y2="200" stroke="#B79554" stroke-width="0.5" opacity="0.6"/>
  <line x1="1170" y1="270" x2="1100" y2="270" stroke="#B79554" stroke-width="0.5" opacity="0.6"/>
  <line x1="1170" y1="270" x2="1135" y2="235" stroke="#B79554" stroke-width="0.3" opacity="0.3"/>
  <!-- Title -->
  <text x="600" y="140" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">SGC TECH AI</text>
  <!-- Subtitle -->
  <text x="600" y="175" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="400" fill="#D9C08A" text-anchor="middle" letter-spacing="6">ENTERPRISE THEME</text>
  <!-- Gold divider line -->
  <rect x="450" y="195" width="300" height="1.5" rx="0.75" fill="url(#goldAccent)"/>
  <!-- Tagline -->
  <text x="600" y="230" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="400" fill="#5F6775" text-anchor="middle" letter-spacing="3">BUILT IN DUBAI. DESIGNED FOR THE WORLD.</text>
  <!-- Coordinates -->
  <text x="30" y="290" font-family="monospace" font-size="7" fill="#B79554" opacity="0.25">25.2048 N</text>
  <text x="1100" y="290" font-family="monospace" font-size="7" fill="#B79554" opacity="0.25">55.2708 E</text>
</svg>