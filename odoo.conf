; SGC Construction Management - Odoo 19 configuration (local Docker)
;
; Used by docker-compose.yml; values can be overridden via env vars on the
; host (Docker Compose interpolates $(VAR) at container start).

[options]
admin_passwd = admin
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo
db_maxconn = 64
db_template = template0
db_name = False
db_filter = ^sgc_test$
list_db = True
without_demo = False

; Addons: bundled Odoo addons only. Our module is bind-mounted at
; /usr/lib/python3/dist-packages/odoo/addons/sgc_construction_management which
; is part of the default addons path (no need to list it explicitly).
addons_path = /usr/lib/python3/dist-packages/odoo/addons

; Data directory (filestore, sessions)
data_dir = /var/lib/odoo

; Limit HTTP to localhost within container; nginx terminates TLS in front
xmlrpc_interface = 0.0.0.0
xmlrpc_port = 8069
proxy_mode = True

; Longpolling port for OWL dashboard WebSocket
gevent_port = 8072

; Logging
logfile = /var/log/odoo/odoo.log
log_level = info
log_db = False
log_db_level = warning
log_handler = :INFO

; Workers
workers = 0
max_cron_threads = 1
limit_memory_hard = 2684354560
limit_memory_soft = 2147483648
limit_time_cpu = 600
limit_time_real = 1200
limit_request = 8192

; Security
csv_internal_sep = ,

; Locale
data_lang = en_US